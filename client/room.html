<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleVoIP - WebRTC Video Room</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <a href="/" class="logo-link">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.53c-.26-.81-1-1.4-1.9-1.4h-1v-3c0-.55-.45-1-1-1h-6v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                    </svg>
                    <span class="logo-text">Simple<span class="highlight">VoIP</span></span>
                </div>
            </a>
            
            <div class="room-badge" id="roomBadge" title="Click to copy Room Link">
                <span class="room-label">Room:</span>
                <span class="room-id" id="roomText">---</span>
                <svg class="copy-icon" viewBox="0 0 24 24" width="16" height="16">
                    <path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                </svg>
            </div>
            
            <div class="status-panel">
                <span class="status-dot disconnected" id="statusDot"></span>
                <span class="status-text" id="statusText">Disconnected</span>
            </div>
        </header>

        <!-- Main Video Workspace -->
        <main class="call-workspace">
            <div class="video-container" id="videoContainer">
                <!-- Waiting Placeholder (shown when alone in the room) -->
                <div class="video-placeholder" id="waitingPlaceholder">
                    <div class="spinner-icon">
                        <svg class="spinner-svg" viewBox="0 0 24 24" width="48" height="48">
                            <circle class="spinner-path" cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="3"></circle>
                        </svg>
                    </div>
                    <p class="placeholder-text" id="waitingPlaceholderText">Waiting for other participants to join...</p>
                </div>

                <!-- Local Video (PiP Window / Grid Item) -->
                <div class="video-wrapper local-wrapper" id="localVideoWrapper">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <div class="video-placeholder" id="localPlaceholder">
                        <div class="placeholder-icon">
                            <svg viewBox="0 0 24 24" width="48" height="48">
                                <path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                            </svg>
                        </div>
                        <p class="placeholder-text" id="localPlaceholderText">Camera is off</p>
                    </div>
                    <span class="video-label">You</span>
                </div>
            </div>
        </main>

        <!-- Controls Dashboard -->
        <footer class="call-controls">
            <div class="controls-panel">
                <!-- Deafen Button (Mute Sound, Disabled initially) -->
                <button class="control-btn media-toggle-btn secondary-btn" id="deafenBtn" title="Deafen (Mute Sound)" disabled>
                    <svg viewBox="0 0 24 24" width="20" height="20" class="btn-icon">
                        <path fill="currentColor" id="deafenPath" d="M12 3a9 9 0 0 0-9 9v7a3 3 0 0 0 3 3h2v-8H5v-2a7 7 0 0 1 14 0v2h-3v8h2a3 3 0 0 0 3-3v-7a9 9 0 0 0-9-9z"/>
                    </svg>
                </button>

                <!-- Toggle Audio Button (Disabled initially) -->
                <button class="control-btn media-toggle-btn secondary-btn" id="muteAudio" title="Toggle Microphone" disabled>
                    <svg viewBox="0 0 24 24" width="20" height="20" class="btn-icon">
                        <path fill="currentColor" id="micPath" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                    </svg>
                </button>

                <!-- Toggle Video Button (Disabled initially) -->
                <button class="control-btn media-toggle-btn secondary-btn" id="muteVideo" title="Toggle Camera" disabled>
                    <svg viewBox="0 0 24 24" width="20" height="20" class="btn-icon">
                        <path fill="currentColor" id="cameraPath" d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
                    </svg>
                </button>

                <!-- Screen Share Button (Disabled initially) -->
                <button class="control-btn media-toggle-btn secondary-btn" id="shareScreenBtn" title="Share Screen" disabled>
                    <svg viewBox="0 0 24 24" width="20" height="20" class="btn-icon">
                        <path fill="currentColor" d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.11-.9-2-2-2H4c-1.11 0-2 .89-2 2v10c0 1.1.89 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/>
                    </svg>
                </button>

                <!-- Switch Camera Button (Hidden initially) -->
                <button class="control-btn media-toggle-btn secondary-btn hidden" id="switchCamera" title="Switch Camera" disabled>
                    <svg viewBox="0 0 24 24" width="20" height="20" class="btn-icon">
                        <path fill="currentColor" d="M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 13c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm1.25-8.84v1.68c0 .28-.34.42-.54.22L10.37 9.7c-.12-.12-.12-.32 0-.44l2.34-2.34c.2-.2.54-.06.54.22v1.02c2.18.25 3.75 2.18 3.54 4.41-.16 1.76-1.57 3.17-3.34 3.34-2.28.21-4.22-1.42-4.41-3.65a.75.75 0 0 1 .74-.82c.38 0 .71.28.74.66.12 1.4 1.34 2.45 2.82 2.31 1.14-.11 2.04-1.01 2.15-2.15.14-1.48-.91-2.7-2.31-2.82z"/>
                    </svg>
                </button>
            </div>
        </footer>
    </div>
    
    <script src="/js/client.js"></script>
</body>
</html>
